name: Create adaptation PR

on:
  pull_request_target:
    types: [labeled]
    branches: [master]
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        type: number
        required: true

jobs:
  main:
    runs-on: ubuntu-slim
    environment: master

    steps:
      # - uses: Garmelon/test-downstream/.downstream/actions/adaptation-pr@master
      - uses: leanprover/downstream/actions/adaptation-pr@actions
        with:
          downstream-action: adaptation-pr.yml
          upstream-token: ${{ secrets.TOKEN_UPSTREAM }}
          downstream-token: ${{ secrets.TOKEN_DOWNSTREAM }}
