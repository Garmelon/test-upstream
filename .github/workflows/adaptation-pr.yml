name: Create adaptation PR

on:
  pull_request_target:
    types: [labeled]
    branches: [master]
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  main:
    runs-on: ubuntu-slim
    environment: master

    steps:
      - name: Find original PR
        id: pr-info
        continue-on-error: true
        uses: Garmelon/test-downstream/.downstream/actions/find-original-pr@master

      - name: Create GitHub App token
        if: steps.pr-info.outcome == 'success'
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.DOWNSTREAM_APP_CLIENT_ID }}
          private-key: ${{ secrets.DOWNSTREAM_APP_PRIVATE_KEY }}
          repositories: test-downstream,test-upstream

      - name: Configure git
        if: steps.pr-info.outcome == 'success'
        uses: Garmelon/test-downstream/.downstream/actions/configure-git@master
        with:
          name: ${{ steps.app-token.outputs.app-slug }}[bot]

      - name: Checkout downstream repo
        if: steps.pr-info.outcome == 'success'
        uses: actions/checkout@v7
        with:
          repository: Garmelon/test-downstream
          ref: green
          token: ${{ steps.app-token.outputs.token }}
          path: downstream
          filter: tree:0
          fetch-depth: 0

      - name: Create adaptation PR
        if: steps.pr-info.outcome == 'success'
        uses: Garmelon/test-downstream/.downstream/actions/adaptation-pr@master
        with:
          app-token: ${{ steps.app-token.outputs.token }}
          app-slug: ${{ steps.app-token.outputs.app-slug }}
          upstream-pr: ${{ steps.pr-info.outputs.number }}
          # upstream-ci-green: TODO
          downstream-repo: Garmelon/test-downstream
          downstream-clone: downstream
          downstream-label: adaptation
          override-toolchain: toolchain-for-pr-${{ steps.pr-info.outputs.number }}-${{ steps.pr-info.outputs.sha }}
